# EscalasPT — Production deployment
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d
# Requires: .env.prod in project root

services:
  postgres:
    image: postgres:16-alpine
    container_name: escalaspt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - escalaspt_pgdata:/var/lib/postgresql/data
      - ./init_db.prod.sh:/docker-entrypoint-initdb.d/01_init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - escalaspt

  redis:
    image: redis:7-alpine
    container_name: escalaspt-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - escalaspt_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - escalaspt

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: escalaspt-api
    restart: unless-stopped
    env_file:
      - ../.env.prod
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    networks:
      - escalaspt

  nginx:
    image: nginx:1.25-alpine
    container_name: escalaspt-nginx
    restart: unless-stopped
    ports:
      - "${ESCALASPT_PORT:-8443}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - escalaspt

  # One-shot container: builds frontend and exits
  frontend-build:
    image: node:20-alpine
    container_name: escalaspt-frontend-build
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_dist:/app/dist
    command: sh -c "npm ci && npm run build"
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  escalaspt_pgdata:
  escalaspt_redis:
  frontend_dist:
  frontend_node_modules:

networks:
  escalaspt:
    driver: bridge
