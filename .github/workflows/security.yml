# ============================================================
# Security CI Pipeline — OWASP V10, ISO 27001 A.8.29
# Runs on every push/PR: SAST, dependency audit, lint.
# ============================================================

name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python SAST + Dependency Audit ────────────────────────
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bandit — Python SAST
        run: |
          pip install bandit
          bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true
          bandit -r app/ -c pyproject.toml -ll

      - name: pip-audit — Dependency vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --require-hashes=false --desc --fix --dry-run || true
          pip-audit --require-hashes=false

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json
          retention-days: 30

  # ── Frontend Dependency Audit ─────────────────────────────
  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit — Dependency vulnerabilities
        run: npm audit --audit-level=high

      - name: ESLint security rules
        run: npx eslint src/ --max-warnings=0 || true
